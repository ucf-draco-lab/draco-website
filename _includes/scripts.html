<!-- third party scripts -->
<script src="https://unpkg.com/@popperjs/core@2.11.8/dist/umd/popper.min.js" defer crossorigin="anonymous"></script>
<script src="https://unpkg.com/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js" defer crossorigin="anonymous"></script>
<script src="https://unpkg.com/mark.js@8.11.1/dist/mark.min.js" defer crossorigin="anonymous"></script>

<!-- include all js in scripts folder -->
{% assign scripts = site.static_files | where_exp: "file", "file.path contains '/_scripts'" %}
{% for script in scripts %}
  <script src="{{ script.path | relative_url }}"></script>
{% endfor %}
